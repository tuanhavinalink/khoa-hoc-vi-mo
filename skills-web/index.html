ympic...)\n- Ví dụ: Vinhomes Hậu Nghĩa (Long An) — căn 60m², vốn 500 triệu → 6 tháng sau lãi 500 triệu (100%)\n\n### Quy hoạch — Cơ hội vàng\n\n- Khi nghe tin **quy hoạch** → mua đất xung quanh dự án ngay\n- Mua nhét vào **giữa khu đông dân cư** → không bị giải tỏa → tự nhiên nằm giữa dự án xịn\n- Chủ đầu tư sẽ **tự tăng giá đất xung quanh** (để đất trong dự án bán được)\n- Nếu tin quy hoạch đã tung ra → **đội lái đã vào mua hết** → muộn rồi\n\n### Địa điểm đầu tư: 6 đại đô thị + vành đai\n\n#### Chỉ mua tại 6 đại đô thị\n1. **Hà Nội** (gồm Bắc Ninh, Hưng Yên, Vĩnh Phúc)\n2. **TP. Hồ Chí Minh** (gồm Bình Dương, Bà Rịa-Vũng Tàu)\n3. **Hải Phòng** (gồm Quảng Ninh)\n4. **Đà Nẵng** (gồm Huế)\n5. **Nha Trang (Khánh Hòa)**\n6. **Phú Quốc**\n\n→ Tất cả nơi khác: **cắt lỗ, chuyển dịch**\n\n#### Vành đai tốt hơn nội đô\n\n| Khu vực | Tăng giá 10 năm |\n|---------|-----------------|\n| Nhà nội đô | Gấp **2 lần** |\n| Nhà vành đai 3 | Gấp **10 lần** |\n| Nhà vành đai 4 | Gấp **50 lần** |\n\n- Nội đô sắp tới: phá dỡ, mở đường 90m, di dời bệnh viện/trường học ra vành đai\n- Phố cổ Hoàn Kiếm → chuyển sang Đông Anh\n- Khu Tống Đản, Khâm Thiên → sớm muộn bốc hết\n\n#### Vành đai cụ thể\n\n**TP.HCM:**\n- Tập trung **vành đai 3** và **vành đai 3,5** (tùy phía)\n\n**Hà Nội:**\n- Tập trung **vành đai 4** và **vành đai 4,5** (tùy khu vực)\n  - Sóc Sơn: vành đai 4\n  - Mỹ Đình: vành đai 4,5\n  - Thường Tín: vành đai 4,5 (giá bằng 1/2 vành đai 4, khoảng cách chỉ thêm 5 phút)\n- Ví dụ: Ocean Park 1 giá cao hơn nhiều so với Ocean Park 2, 3 — nhưng khoảng cách đi lại tương đương, dư địa tăng trưởng OP2/3 còn rất nhiều\n\n### Nguyên tắc đầu tư BĐS\n\n- Mỗi năm tăng trưởng ít nhất **15%** mới nên đầu tư\n- Đánh dài hạn: **10–20 năm**\n- Mua 2 BĐS 5 tỷ thanh khoản cao **tốt hơn** 1 BĐS 10 tỷ kém thanh khoản\n- Ưu tiên BĐS **tạo được dòng tiền cho thuê** (chứng minh giá trị tài sản)\n  - 1 triệu/tháng dòng tiền → vẫn có giá trị\n  - 0 đồng dòng tiền → tài sản vô giá trị (như con người không biết làm việc gì)\n\n### Deadline thoát hàng — Rất quan trọng\n\n| Mốc thời gian | Hành động |\n|---------------|-----------|\n| **Nay – 2040** | Gom tài sản (15 năm) |\n| **2040 – 2045** | Bán dần, thoát hàng |\n| **Sau 2045** | Không bán được nữa → rơi vào tình trạng Nhật/Hàn/Trung Quốc |\n\n- Có 10 căn nhà → chỉ giữ **2 căn có dòng tiền** → bán 8 căn trước 2040\n- Căn nào dòng tiền **dưới 5%/năm** → thoát trước 2040\n- Sau 2050: dân già, giảm dân số → giá cao nhưng **không ai mua** → giống Nhật cho nhà miễn phí\n\n### Giá trị thật vs. Giá trị danh nghĩa\n\n- Nhiều BĐS hiện tại: **giá tăng gấp đôi nhưng không bán được** = tăng ảo\n- Giá rất cao, thanh khoản = 0 → phấn khởi giả\n- Đừng nhầm lẫn giá trị danh nghĩa với giá trị thực (có thể bán được)\n- **Trong một dự án**, không phải ai cũng có lãi — phải có người bị kẹt để tiền phát triển đất nước\n\n## Thuật ngữ quan trọng\n\n| Thuật ngữ | Giải thích |\n|-----------|-----------|\n| **Tụ - Tinh - Xô - Tán** | 4 nguyên tắc chọn vị trí BĐS: Đông người, Tinh hoa, Nhộn nhịp (nên mua) vs. Vắng vẻ (tránh) |\n| **Xén lông cừu** | Cơ chế thiết kế BĐS thu tiền từ tầng trung lưu → phát triển đất nước |\n| **Đổi đất lấy hạ tầng** | Nhà nước cho đất → doanh nghiệp xây cầu/đường đổi lại |\n| **Địa tô** | Thuế chênh lệch chuyển đổi mục đích sử dụng đất |\n| **Thanh khoản** | Khả năng bán/chuyển đổi BĐS thành tiền nhanh |\n| **Dòng tiền** | Thu nhập hàng tháng từ cho thuê BĐS — chứng minh giá trị tài sản |\n| **NƠXH** | Nhà ở xã hội — phân khúc giá rẻ cho người thu nhập thấp |\n| **Giá trị danh nghĩa vs. Giá trị thực** | Giá trên giấy vs. Giá thực sự bán được |\n| **Vành đai 3, 3.5, 4, 4.5** | Tuyến đường vành đai quanh Hà Nội/TP.HCM — trọng tâm đầu tư |\n| **FOMO BĐS** | Mua theo tâm lý đám đông, sợ bỏ lỡ → dễ bị kẹt |\n| **Studio** | Căn hộ nhỏ nhất trong dự án (25–35m²) — sản phẩm rẻ nhất, thanh khoản tốt |\n| **TOD (Transit-Oriented Development)** | Phát triển đô thị xoay quanh nút giao thông |\n| **Đình lạm** | Giá tài sản cao nhưng không giao dịch được → kinh tế trì trệ |\n| **Bẫy thu nhập trung bình** | Quốc gia không thể tăng GDP/người vượt mức trung bình |"}];
const BUOI = {1:'Buổi 1: Cấu Trúc Tài Chính Toàn Cầu',2:'Buổi 2: Bài Học Từ Các Quốc Gia',3:'Buổi 3: Chiến Lược Việt Nam',4:'Buổi 4: Đầu Tư Thực Chiến'};
const ICONS = {1:'📘',2:'🌏',3:'🇻🇳',4:'💰'};

function buildTOC() {
  let h='';
  for(let b=1;b<=4;b++) {
    const items=LESSONS.filter(l=>l.buoi===b);
    h+=`<div class="toc-section"><div class="toc-section-title" onclick="showBuoi(${b})">${ICONS[b]} ${BUOI[b]}</div>`;
    items.forEach((l,i)=>{
      h+=`<a class="toc-item" data-b="${b}" data-i="${l.idx}" onclick="showLesson(${b},${l.idx})">${l.idx}. ${l.title}</a>`;
    });
    h+='</div>';
  }
  document.getElementById('toc-content').innerHTML=h;
}

function setNav(n){ document.querySelectorAll('.nav-btn').forEach((b,i)=>b.classList.toggle('active',i===n)); }
function setToc(b,idx){ document.querySelectorAll('.toc-item').forEach(a=>a.classList.toggle('active',+a.dataset.b===b&&+a.dataset.i===idx)); }

function showOverview() {
  setNav(0); setToc(0,0);
  let h='<div class="card-grid">';
  LESSONS.forEach(l=>{
    h+=`<div class="lesson-card" onclick="showLesson(${l.buoi},${l.idx})">
      <span class="badge">${ICONS[l.buoi]} Buổi ${l.buoi} — Phần ${l.idx}</span>
      <h3>${l.title}</h3><p>${l.desc}</p></div>`;
  });
  h+='</div>';
  document.getElementById('main').innerHTML=h;
}

function showBuoi(b) {
  setNav(b); setToc(0,0);
  const items=LESSONS.filter(l=>l.buoi===b);
  let h=`<h2 style="font-family:'Playfair Display',serif;color:var(--primary);margin-bottom:1rem">${ICONS[b]} ${BUOI[b]}</h2><div class="card-grid">`;
  items.forEach(l=>{
    h+=`<div class="lesson-card" onclick="showLesson(${l.buoi},${l.idx})">
      <span class="badge">Phần ${l.idx}</span>
      <h3>${l.title}</h3><p>${l.desc}</p></div>`;
  });
  h+='</div>';
  document.getElementById('main').innerHTML=h;
}

function showLesson(b,idx) {
  const lesson=LESSONS.find(l=>l.buoi===b&&l.idx===idx);
  if(!lesson) return;
  setNav(b); setToc(b,idx);

  const rendered=marked.parse(lesson.content);

  // Find prev/next
  const allIdx=LESSONS.indexOf(lesson);
  const prev=allIdx>0?LESSONS[allIdx-1]:null;
  const next=allIdx<LESSONS.length-1?LESSONS[allIdx+1]:null;

  let nav='<div class="lesson-nav">';
  if(prev) nav+=`<a onclick="showLesson(${prev.buoi},${prev.idx})">← ${prev.title}</a>`; else nav+='<span></span>';
  if(next) nav+=`<a onclick="showLesson(${next.buoi},${next.idx})">${next.title} →</a>`; else nav+='<span></span>';
  nav+='</div>';

  document.getElementById('main').innerHTML=`
    <div class="article">
      <div class="back-btn" onclick="showBuoi(${b})">← Quay lại ${BUOI[b]}</div>
      <h1>${lesson.title}</h1>
      ${rendered}
      ${nav}
    </div>`;
  window.scrollTo({top:0,behavior:'smooth'});
}

buildTOC();
showOverview();
<\/script>
</body>
